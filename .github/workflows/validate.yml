name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bash:
    name: Bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check syntax
        run: bash -n scripts/*.sh
      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

  powershell:
    name: PowerShell
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PowerShell documentation
        shell: pwsh
        run: ./tests/test_documentation.ps1

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall -q src tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
